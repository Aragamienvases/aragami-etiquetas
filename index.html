<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aragami Etiquetas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#f0ede8;--sur:#fff;--bor:#d8d3cc;--drk:#1a1814;--red:#c8401a;--grn:#2a6b3c;--mut:#7a756e;--blu:#1a4a8a;--yel:#b07800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--drk);min-height:100vh;}
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.lg{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mut);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;}
h1{font-size:26px;font-weight:700;margin-bottom:6px;}
.sub{font-size:14px;color:var(--mut);margin-bottom:36px;}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:820px;width:100%;}
.pb{background:var(--sur);border:1.5px solid var(--bor);border-radius:10px;padding:22px 14px;text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:rgba(0,0,0,.1);touch-action:manipulation;user-select:none;-webkit-user-select:none;font-family:'IBM Plex Sans',sans-serif;width:100%;}
.pb:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.pb.of:hover{border-color:var(--red);background:#fff8f6;}
.pb.im:hover{border-color:var(--grn);background:#f6fff8;}
.pb.fa:hover{border-color:var(--blu);background:#f6f8ff;}
.pb .ic{font-size:24px;display:block;margin-bottom:7px;}
.pb .nm{font-size:12px;font-weight:700;}
.pb .ds{font-size:10px;color:var(--mut);margin-top:2px;}
.hdr{background:var(--drk);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-logo{color:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.15em;}
.badg{font-size:11px;font-weight:700;padding:5px 14px;border-radius:3px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
.b-of{background:var(--red);color:#fff;}.b-im{background:var(--grn);color:#fff;}.b-fa{background:var(--blu);color:#fff;}
.lay{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 52px);}
.sdb{background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;}
.sdb-hd{padding:12px 16px;border-bottom:1px solid var(--bor);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);background:#faf9f7;display:flex;align-items:center;justify-content:space-between;}
.sdb-hd button{background:var(--red);color:#fff;border:none;border-radius:3px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;}
.stabs{display:flex;border-bottom:1px solid var(--bor);}
.stab{flex:1;text-align:center;padding:8px 4px;font-size:10px;font-weight:600;cursor:pointer;color:var(--mut);border-bottom:2px solid transparent;-webkit-tap-highlight-color:rgba(0,0,0,.05);touch-action:manipulation;}
.stab.act{color:var(--red);border-bottom-color:var(--red);}
.pi{padding:11px 16px;border-bottom:1px solid var(--bor);cursor:pointer;transition:background .12s;position:relative;padding-right:60px;-webkit-tap-highlight-color:rgba(0,0,0,.05);touch-action:manipulation;}
.pi:hover{background:#faf9f7;}.pi.act{background:#fff8f6;border-left:3px solid var(--red);}
.pi-ref{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;margin-bottom:2px;}
.pi-cli{font-size:11px;color:var(--mut);margin-bottom:4px;}
.pi-fec{font-size:10px;color:var(--mut);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
.pi-bds{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.bx{font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;text-transform:uppercase;}
.bp{background:#fff3cd;color:#856404;}.bi{background:#d1e7dd;color:#0f5132;}.bf{background:#cfe2ff;color:#084298;}
.bd{background:#e2e3e5;color:#41464b;}.bq{background:#f3e5f5;color:#4a0072;}.bt{background:#d1e7dd;color:#0f5132;}.ba{background:#ccc;color:#333;}
.drag-handle{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:#ccc;cursor:grab;font-size:14px;padding:4px;}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:2px 4px;position:absolute;right:28px;top:50%;transform:translateY(-50%);}
.del-btn:hover{color:var(--red);}
.main{padding:22px;overflow-y:auto;background:var(--bg);}
.pan{background:var(--sur);border:1px solid var(--bor);border-radius:5px;margin-bottom:14px;overflow:hidden;}
.ph{background:var(--drk);color:#fff;padding:9px 14px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.ph span{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#888;font-weight:400;}
.pb2{padding:14px;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.ik{font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;}
.iv{font-family:'IBM Plex Mono',monospace;font-size:12px;}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn{padding:10px 18px;border:none;border-radius:4px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.b1{background:var(--drk);color:#fff;}.b2{background:var(--grn);color:#fff;}.b3{background:var(--sur);color:var(--drk);border:1px solid var(--bor);}
.b4{background:var(--red);color:#fff;}.b5{background:var(--yel);color:#fff;}
.br{display:flex;gap:8px;flex-wrap:wrap;}
.lbl{background:#faf9f7;border:1.5px dashed var(--bor);border-radius:4px;padding:11px 14px;cursor:pointer;font-size:13px;color:var(--mut);display:flex;align-items:center;gap:8px;width:100%;transition:border-color .15s;}
.lbl:hover{border-color:var(--red);color:var(--drk);}.lbl input{display:none;}
.f2{display:flex;flex-direction:column;gap:3px;}
.f2 label{font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;}
.f2 input,.f2 select{background:var(--sur);border:1px solid var(--bor);border-radius:4px;padding:7px 9px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--drk);outline:none;width:100%;}
.f2 input:focus,.f2 select:focus{border-color:var(--red);}
.lf{display:flex;flex-direction:column;gap:3px;}
.lf label{font-size:9px;color:var(--mut);font-weight:700;text-transform:uppercase;}
.lf select,.lf input{background:var(--sur);border:1px solid var(--bor);border-radius:3px;padding:5px 7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--drk);outline:none;}
.lf select:focus,.lf input:focus{border-color:var(--red);}
.lfields{display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap;}
.lsep{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--mut);padding-bottom:2px;}
.lres{background:var(--drk);color:#34d9a0;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;padding:7px 12px;border-radius:3px;margin-top:8px;}
.cr{display:flex;gap:10px;align-items:flex-end;margin-bottom:12px;}
.ci label{font-size:9px;color:var(--mut);font-weight:700;text-transform:uppercase;display:block;margin-bottom:3px;}
.ci input{width:75px;background:var(--sur);border:1px solid var(--bor);border-radius:3px;padding:7px;font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:var(--drk);outline:none;text-align:center;}
.ci input:focus{border-color:var(--red);}
.ct{font-size:11px;color:var(--mut);font-family:'IBM Plex Mono',monospace;padding-bottom:7px;}
.lw{padding:10px;}
.lb{width:100%;max-width:360px;background:#fff;border:1px solid #888;border-radius:3px;padding:6px 8px;font-family:Arial,sans-serif;box-shadow:1px 1px 5px rgba(0,0,0,.1);}
.lt{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:3px;margin-bottom:4px;}
.lr{font-size:17px;font-weight:900;line-height:1;}.ln{font-size:44px;font-weight:900;line-height:1;}
.ll{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.lb2{border:1.5px solid #000;padding:1px 3px;font-size:8px;font-weight:700;white-space:nowrap;}
.lv{font-size:8px;}.lbot{display:flex;align-items:flex-end;margin-top:3px;}
.ll2{border:1.5px solid #000;font-size:7px;font-weight:700;padding:1px 3px;display:inline-block;margin-bottom:2px;}
.lv2{font-size:7px;margin-bottom:2px;}.lbr{font-size:6px;margin-top:1px;font-family:monospace;}
.nr{display:flex;align-items:center;gap:8px;margin-top:7px;}
.nb{background:var(--drk);color:#fff;border:none;border-radius:3px;padding:5px 10px;font-size:11px;cursor:pointer;}
.ni{font-family:monospace;font-size:11px;color:var(--mut);}
.da{min-height:160px;background:var(--bg);border:1px dashed var(--bor);border-radius:3px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.da img{max-width:100%;max-height:280px;object-fit:contain;}.da iframe{width:100%;height:280px;border:none;}
.cfg-item{display:flex;align-items:center;justify-content:space-between;background:#faf9f7;border:1px solid var(--bor);border-radius:4px;padding:8px 12px;margin-bottom:6px;}
.cfg-code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;min-width:40px;}
.cfg-name{font-size:12px;flex:1;margin-left:10px;}
.cfg-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;}.cfg-del:hover{color:var(--red);}
.cfg-add{display:flex;gap:8px;margin-top:8px;}
.cfg-add input{background:var(--sur);border:1px solid var(--bor);border-radius:4px;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--drk);outline:none;}
.cfg-add input:focus{border-color:var(--red);}
.cfg-add button{background:var(--red);color:#fff;border:none;border-radius:4px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.md{background:#fff;border-radius:8px;padding:22px;max-width:400px;width:90%;}
.md h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.md p{font-size:12px;color:var(--mut);margin-bottom:18px;line-height:1.5;}
.mdb{display:flex;gap:8px;}
.mdb button{flex:1;padding:9px;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;}
.mc{background:var(--red);color:#fff;}.mx{background:var(--bg);color:var(--drk);}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sel-btn{background:#faf9f7;border:1.5px solid var(--bor);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.sel-btn:hover{border-color:var(--red);background:#fff8f6;}.sel-btn .snm{font-size:11px;font-weight:700;}
.calc-box{background:#f0f7f0;border:1px solid #b8d8b8;border-radius:5px;padding:12px 14px;margin-top:10px;}
.calc-box .cl{font-size:10px;font-weight:700;color:var(--grn);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.calc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.calc-row .ck{color:var(--mut);}.calc-row .cv{font-family:'IBM Plex Mono',monospace;font-weight:600;}
.warn{background:#fff8e1;border:1px solid #ffb300;border-radius:4px;padding:10px 14px;font-size:12px;color:#7a5900;margin-bottom:12px;}
.hid{display:none!important;}
.pi.drag-over{background:#fff3cd;}
@keyframes pulso{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(42,107,60,.4);}50%{opacity:.85;box-shadow:0 0 0 6px rgba(42,107,60,0);}}
.pulso{animation:pulso 1.3s ease-in-out infinite;}
</style>
</head>
<body>
<div id="login">
  <div class="lg">Aragami Sistema de Etiquetado</div>
  <h1>Quien eres?</h1>
  <div class="sub">Selecciona tu perfil para continuar</div>
  <div class="pgrid">
    <button class="pb of" onclick="login('of')"><span class="ic">👔</span><div class="nm">OFICINA</div><div class="ds">Gestion pedidos</div></button>
    <button class="pb im" onclick="login('f1')"><span class="ic">🖨️</span><div class="nm">FLEXO 1</div><div class="ds">Impresion flexo</div></button>
    <button class="pb im" onclick="login('f2')"><span class="ic">🖨️</span><div class="nm">FLEXO 2</div><div class="ds">Impresion flexo</div></button>
    <button class="pb im" onclick="login('di')"><span class="ic">🖥️</span><div class="nm">DIGITAL</div><div class="ds">Impresion digital</div></button>
    <button class="pb fa" onclick="login('fa65')"><span class="ic">🏭</span><div class="nm">FABRICA 6,5oz</div><div class="ds">Linea 6,5oz</div></button>
    <button class="pb fa" onclick="login('fa6')"><span class="ic">🏭</span><div class="nm">FABRICA 6oz</div><div class="ds">Linea 6oz</div></button>
    <button class="pb fa" onclick="login('fa4812')"><span class="ic">🏭</span><div class="nm">FABRICA 4,8,12oz</div><div class="ds">Linea multiple</div></button>
  </div>
</div>
<div id="app" class="hid">
  <div class="hdr">
    <div class="hdr-logo">ARAGAMI ETIQUETAS</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="save-ind" style="font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;"></span>
      <div class="badg" id="badg" onclick="logout()"></div>
    </div>
  </div>
  <div class="lay">
    <div class="sdb">
      <div class="sdb-hd"><span>Pedidos</span><button id="btn-new" onclick="nuevoPedido()" class="hid">+ Nuevo</button></div>
      <div class="stabs" id="stabs"></div>
      <div id="sdb-list"></div>
    </div>
    <div class="main" id="main"><div style="padding:40px;color:var(--mut);font-size:13px;text-align:center;">Selecciona un pedido</div></div>
  </div>
</div>
<div class="mo hid" id="modal">
  <div class="md"><h3 id="mt"></h3><p id="mp"></p>
    <div class="mdb"><button class="mx" onclick="closeM()">Cancelar</button><button class="mc" id="mok">Confirmar</button></div>
  </div>
</div>
<div class="mo hid" id="modal-dest">
  <div class="md" style="max-width:420px;">
    <h3 id="dest-title" style="margin-bottom:14px;"></h3>
    <div class="sel-grid" id="dest-grid"></div>
    <button class="btn b3" style="width:100%;" onclick="closeDest()">Cancelar</button>
  </div>
</div>
<script>
var GSURL='https://script.google.com/macros/s/AKfycbzUhGrBr9RpFbwixIKPxNZsPr8ZmG4XStNPaehqIZSria7Fdu92gFWftiqohAAGv0U/exec';
var prof=null,sel=null,caja=1,mcb=null,curTab='pend',dragSrc=null;
var cfg={provs:[{c:'BO',n:'Bobrobil'},{c:'CO',n:'Comart'},{c:'ME',n:'Metpack'}],mats:[{c:'ME',n:'Metsa'},{c:'AP',n:'App Paper'}],plantas:[{c:'F1',n:'Flexo 1'},{c:'F2',n:'Flexo 2'},{c:'D',n:'Digital'},{c:'Q',n:'Quevedo'}]};
var peds=[];
var pnames={of:'OFICINA',f1:'FLEXO 1',f2:'FLEXO 2',di:'DIGITAL',fa65:'FABRICA 6,5oz',fa6:'FABRICA 6oz',fa4812:'FABRICA 4,8,12oz'};
var pbadg={of:'b-of',f1:'b-im',f2:'b-im',di:'b-im',fa65:'b-fa',fa6:'b-fa',fa4812:'b-fa'};
function isImp(p){return p==='f1'||p==='f2'||p==='di';}
function isFab(p){return p==='fa65'||p==='fa6'||p==='fa4812';}
function savePedidos(){fetch(GSURL,{method:'POST',body:JSON.stringify({action:'savePedidos',pedidos:peds})}).catch(function(e){console.log('Error:',e);});}
function saveCfg(){fetch(GSURL,{method:'POST',body:JSON.stringify({action:'saveCfg',cfg:cfg})}).catch(function(e){console.log('Error:',e);});}
function loadData(cb){
  fetch(GSURL+'?action=getPedidos').then(function(r){return r.json();}).then(function(data){
    if(Array.isArray(data)&&data.length>0)peds=data;
    return fetch(GSURL+'?action=getCfg');
  }).then(function(r){return r.json();}).then(function(data){
    if(data&&data.provs)cfg=data;
    if(cb)cb();
  }).catch(function(e){console.log('Error cargando:',e);if(cb)cb();});
}
function login(p){
  var pass=null;
  if(p==='of')pass='2026';
  else if(p==='f1'||p==='f2'||p==='di')pass='2026';
  if(pass){
    var authed=sessionStorage.getItem('auth_'+p);
    if(!authed){
      var input=prompt('Contrasena para '+pnames[p]+':');
      if(input===null)return;
      if(input.trim()!==pass){alert('Contrasena incorrecta.');return;}
      sessionStorage.setItem('auth_'+p,'1');
    }
  }
  prof=p;sel=null;curTab='pend';
  document.getElementById('login').classList.add('hid');
  document.getElementById('app').classList.remove('hid');
  var b=document.getElementById('badg');b.textContent=pnames[p]+' - Salir';b.className='badg '+pbadg[p];
  if(p==='of')document.getElementById('btn-new').classList.remove('hid');
  document.getElementById('main').innerHTML='<div style="padding:40px;color:var(--mut);text-align:center;">Cargando pedidos...</div>';
  document.getElementById('sdb-list').innerHTML='<div style="padding:20px;text-align:center;color:var(--mut);font-size:12px;">⏳ Cargando...</div>';
  document.getElementById('sdb-list').style.pointerEvents='none';
  document.getElementById('stabs').style.pointerEvents='none';
  loadData(function(){
    document.getElementById('sdb-list').style.pointerEvents='auto';
    document.getElementById('stabs').style.pointerEvents='auto';
    renderTabs();renderList();
  });
}
function logout(){
  prof=null;sel=null;curTab='pend';
  document.getElementById('app').classList.add('hid');
  document.getElementById('login').classList.remove('hid');
  document.getElementById('btn-new').classList.add('hid');
  document.getElementById('stabs').innerHTML='';
  document.getElementById('main').innerHTML='<div style="padding:40px;color:var(--mut);text-align:center;">Selecciona un pedido</div>';
}
function renderTabs(){
  var tabs=document.getElementById('stabs');tabs.innerHTML='';
  var defs=[];
  if(prof==='of')defs=[{k:'enc',l:'En curso'},{k:'ter',l:'Terminados'},{k:'alb',l:'Albaranados'}];
  else if(isImp(prof)||isFab(prof))defs=[{k:'pend',l:'Pendientes'},{k:'enc',l:'En curso'},{k:'ter',l:'Terminados'}];
  defs.forEach(function(d){
    var t=document.createElement('div');t.className='stab'+(curTab===d.k?' act':'');t.textContent=d.l;
    t.onclick=function(){curTab=d.k;document.querySelectorAll('.stab').forEach(function(x){x.classList.remove('act');});t.classList.add('act');sel=null;renderList();document.getElementById('main').innerHTML='<div style="padding:40px;color:var(--mut);text-align:center;">Selecciona un pedido</div>';};
    tabs.appendChild(t);
  });
}
function getPeds(){
  return peds.filter(function(p){
    if(prof==='of'){
      if(curTab==='enc')return p.est==='pend'||p.est==='imp'||p.est==='imp-enc'||p.est==='fab'||p.est==='fab-enc';
      if(curTab==='ter')return p.est==='ter';
      if(curTab==='alb')return p.est==='alb';
    }
    if(isImp(prof)){
      if(curTab==='pend')return p.asig===prof&&p.est==='imp';
      if(curTab==='enc')return p.asig===prof&&p.est==='imp-enc';
      if(curTab==='ter')return p.estImp===prof&&(p.est==='fab'||p.est==='fab-enc'||p.est==='ter'||p.est==='alb');
    }
    if(isFab(prof)){
      if(curTab==='pend')return p.asig===prof&&p.est==='fab';
      if(curTab==='enc')return p.asig===prof&&p.est==='fab-enc';
      if(curTab==='ter')return p.asig===prof&&p.est==='ter';
    }
    return false;
  });
}
function renderList(){
  var list=document.getElementById('sdb-list');list.innerHTML='';
  getPeds().forEach(function(p){
    var d=document.createElement('div');
    d.className='pi'+(sel&&sel.id===p.id?' act':'');
    d.onclick=function(e){if(e.target.classList.contains('del-btn')||e.target.classList.contains('drag-handle'))return;sel=p;caja=1;renderList();renderMain();};
    var eb='';
    if(p.est==='pend')eb='<span class="bx bp">Pendiente</span>';
    else if(p.est==='imp')eb='<span class="bx bp">Pend. lote</span>';
    else if(p.est==='imp-enc')eb='<span class="bx bi">En curso imp.</span>';
    else if(p.est==='fab')eb='<span class="bx bp">Pend. fab.</span>';
    else if(p.est==='fab-enc')eb='<span class="bx bf">En curso fab.</span>';
    else if(p.est==='ter')eb='<span class="bx bt">Terminado</span>';
    else if(p.est==='alb')eb='<span class="bx ba">Albaranado</span>';

function selDestNuevo(tipo){
  var opts=tipo==='imp'?[{id:'f1',nm:'Flexo 1'},{id:'f2',nm:'Flexo 2'},{id:'di',nm:'Digital'}]:[{id:'fa65',nm:'Fabrica 6,5oz'},{id:'fa6',nm:'Fabrica 6oz'},{id:'fa4812',nm:'Fabrica 4,8,12oz'}];
  document.getElementById('dest-title').textContent=tipo==='imp'?'Enviar a Impresion':'Enviar a Fabrica';
  var g=document.getElementById('dest-grid');
  g.innerHTML=opts.map(function(o){return'<div class="sel-btn" onclick="crearP(\''+tipo+'\',\''+o.id+'\');closeDest();"><div class="snm">'+o.nm+'</div></div>';}).join('');
  document.getElementById('modal-dest').classList.remove('hid');
}
function calcE(){var q=parseInt(document.getElementById('nq').value)||0,ca=parseInt(document.getElementById('nca').value)||1;document.getElementById('ne').value=ca>0?Math.ceil(q/ca):'';}
function leerPDF(input){if(!input.files[0])return;leerPDFFile(input.files[0]);}
function leerPDFFile(file){
  if(!file)return;
  var nom=file.name;
  document.getElementById('lpdf').innerHTML='📄 Leyendo '+nom+'...';
  var reader=new FileReader();
  reader.onload=function(e){
    var ta=new Uint8Array(e.target.result);
    pdfjsLib.getDocument(ta).promise.then(function(pdf){
      pdf.getPage(1).then(function(page){
        page.getTextContent().then(function(content){
          var lines=content.items.map(function(i){return i.str.trim();}).filter(function(s){return s.length>0;});
          var ref='',prod='',imp='',bol='',caj='',pallet='',cant='',num='',fec='',cli='';
          ref=lines[0]||'';
          var desc=(lines[1]||'')+' '+(lines[2]||'');
          if(lines[3]&&/^\d+$/.test(lines[3].trim()))cant=lines[3].trim();
          var pm=desc.match(/(\d+)\/(\d+)\/(\d+)/);if(pm){bol=pm[1];caj=pm[2];pallet=pm[3];}
          var desc2=desc.replace(/[_\s]*\d+\/\d+\/\d+\s*/,'').trim();
          var ui=desc2.indexOf('_');if(ui>0){prod=desc2.substring(0,ui).trim();imp=desc2.substring(ui+1).trim();}else{prod=desc2;}
          var pvm=lines.join(' ').match(/PV\d+/);if(pvm)num=pvm[0];
          var fm=lines.join(' ').match(/(\d{2}\/\d{2}\/\d{4})/);if(fm)fec=fm[1];
          for(var i=0;i<lines.length;i++){if(lines[i].toLowerCase().includes('direcc')){if(lines[i+1]){cli=lines[i+1];break;}}}
          var etiq=(caj&&cant)?Math.ceil(parseInt(cant)/parseInt(caj)):'';
          document.getElementById('nr').value=ref;document.getElementById('np').value=prod;document.getElementById('ni2').value=imp;
          document.getElementById('nb').value=bol;document.getElementById('nca').value=caj;document.getElementById('npa').value=pallet;
          document.getElementById('nq').value=cant;document.getElementById('ne').value=etiq;
          document.getElementById('nn').value=num;document.getElementById('nf').value=fec;document.getElementById('nc').value=cli;
          document.getElementById('lpdf').innerHTML='✅ '+nom;
          document.getElementById('lpdf-zone').style.borderColor='var(--grn)';
          document.getElementById('lpdf-zone').style.background='#f6fff8';
          document.getElementById('pst').style.display='block';
        });
      });
    }).catch(function(err){alert('Error PDF: '+err.message);document.getElementById('lpdf').innerHTML='📄 Arrastra el PDF aqui o haz clic para seleccionar';});
  };
  reader.readAsArrayBuffer(file);
}
function crearP(dest,destId){
  var ref=document.getElementById('nr').value.trim(),cli=document.getElementById('nc').value.trim();
  if(!ref||!cli){alert('Referencia y cliente son obligatorios.');return;}
  var asig=dest==='imp'?(destId||'f1'):dest==='fab'?(destId||'fa65'):'';
  var cajVal=parseInt(document.getElementById('nca').value)||0;
  var paVal=parseInt(document.getElementById('npa').value)||0;
  var disLink=document.getElementById('dis-link')?document.getElementById('dis-link').value.trim():'';
  var disEmbed='';
  if(disLink){var m=disLink.match(/\/d\/([a-zA-Z0-9_-]+)/);if(m)disEmbed='https://drive.google.com/file/d/'+m[1]+'/preview';else disEmbed=disLink;}
  var cajAnon=document.getElementById('ncaj')?document.getElementById('ncaj').checked:false;
  var p={id:Date.now(),ref:ref,cli:cli,prod:document.getElementById('np').value.trim(),imp:document.getElementById('ni2').value.trim(),
    bol:parseInt(document.getElementById('nb').value)||0,caj:cajVal,cant:paVal,
    netiq:parseInt(document.getElementById('ne').value)||0,lote:'',cajAnon:cajAnon,
    est:dest==='pend'?'pend':dest,asig:asig,estImp:'',disData:disEmbed,disType:disEmbed?'drive':null,
    num:document.getElementById('nn').value.trim()||'PV-NUEVO',
    fec:document.getElementById('nf').value.trim()||new Date().toLocaleDateString('es-ES'),
    uds:0,pallets:0,capas:0,fechaCierre:'',fechaCierreImp:''};
  peds.unshift(p);sel=p;savePedidos();renderList();renderMain();
}
function c39(canvas,text,bw,h){
  var C={'0':'nnnwwnwnn','1':'wnnwnnnnw','2':'nnwwnnnnw','3':'wnwwnnnnn','4':'nnnwwnnnw','5':'wnnwwnnnn','6':'nnwwwnnnn','7':'nnnwnnwnw','8':'wnnwnnwnn','9':'nnwwnnwnn','A':'wnnnnwnnw','B':'nnwnnwnnw','C':'wnwnnwnnn','D':'nnnnwwnnw','E':'wnnnwwnnn','F':'nnwnwwnnn','G':'nnnnnwwnw','H':'wnnnnwwnn','I':'nnwnnwwnn','J':'nnnnwwwnn','K':'wnnnnnnww','L':'nnwnnnnww','M':'wnwnnnnwn','N':'nnnnwnnww','O':'wnnnwnnwn','P':'nnwnwnnwn','Q':'nnnnnnwww','R':'wnnnnnwwn','S':'nnwnnnwwn','T':'nnnnwnwwn','U':'wwnnnnnnw','V':'nwwnnnnnw','W':'wwwnnnnnn','X':'nwnnwnnnw','Y':'wwnnwnnnn','Z':'nwwnwnnnn','-':'nwnnnnwnw','_':'nwnnnwnnn','*':'nwnnwnnnw',',':'nwnwnwnnn','.':'wwnnnnwnn'};
  var full='*'+text.toUpperCase()+'*',bars=[];
  for(var i=0;i<full.length;i++){var ch=full[i],pat=C[ch]||C['*'];for(var j=0;j<pat.length;j++)bars.push({w:pat[j]==='w'?bw*3:bw,black:j%2===0});if(i<full.length-1)bars.push({w:bw,black:false});}
  var tw=bars.reduce(function(s,b){return s+b.w;},0);canvas.width=tw;canvas.height=h;
  var ctx=canvas.getContext('2d');ctx.fillStyle='white';ctx.fillRect(0,0,tw,h);ctx.fillStyle='black';
  var x=0;bars.forEach(function(b){if(b.black)ctx.fillRect(x,0,b.w,h);x+=b.w;});
}
